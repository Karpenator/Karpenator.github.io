<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultima BANK Parameter Converter</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1C1C1C;
        color: #E0E0E0;
        padding: 20px;
        margin: 0;
    }

    h1 {
        color: #76FF03;
        text-align: center;
        margin-bottom: 10px;
    }

    .description {
        text-align: center;
        color: #888;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
    }

    .example-box {
        background-color: #252525;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 20px;
    }

    .example-box h3 {
        color: #76FF03;
        margin-top: 0;
        font-size: 15px;
    }

    .example-box code {
        color: #aaa;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 13px;
        display: block;
        line-height: 1.6;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #76FF03;
        font-weight: 500;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        background-color: #2D2D2D;
        color: #E0E0E0;
        border: 1px solid #444;
        border-radius: 6px;
        font-size: 14px;
    }

    input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        background-color: #2D2D2D;
        color: #E0E0E0;
        border: 1px solid #444;
        border-radius: 6px;
    }

    button {
        padding: 12px 25px;
        background-color: #2D2D2D;
        color: #76FF03;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        transition: all 0.3s ease;
        margin-right: 10px;
    }

    button:hover {
        background-color: #3D3D3D;
        border-color: #76FF03;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(118, 255, 3, 0.2);
    }

    #progress-bar {
        width: 100%;
        height: 25px;
        background-color: #2D2D2D;
        margin: 20px 0;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #444;
    }

    #progress {
        width: 0;
        height: 100%;
        background-color: #76FF03;
        transition: width 0.3s ease;
    }

    #info {
        color: #76FF03;
        text-align: center;
        font-size: 16px;
        margin-top: 15px;
    }

    .buttons-row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>🏦 Ultima BANK Parameter Converter</h1>
        <p class="description">
            Конвертирует файлы Ultima BANK в формат BANKING с сохранением балансов игроков.
        </p>

        <div class="example-box">
            <h3>📖 Как использовать:</h3>
            <code>
                1. Выберите файл BANKING_*.txt от Ultima BANK<br>
                2. Укажите папку для сохранения<br>
                3. Нажмите "Convert"<br>
                4. Будут созданы JSON файлы для каждого игрока
            </code>
        </div>

        <label for="ultima-path">Path to Ultima BANK file:</label>
        <input type="file" id="ultima-path">
        <br>
        <label for="save-folder">Save folder:</label>
        <div class="buttons-row">
            <input type="text" id="save-folder" placeholder="Enter path or click Select">
            <button id="select-save-folder">Select</button>
        </div>
        <button id="convert">Convert</button>
        
        <div id="progress-bar">
            <div id="progress"></div>
        </div>
        <p id="info"></p>
    </div>

    <script>
        document.getElementById("select-save-folder").addEventListener("click", function() {
            let saveFolder = prompt("Enter save folder path:");
            if (saveFolder) {
                document.getElementById("save-folder").value = saveFolder;
            }
        });

        document.getElementById("convert").addEventListener("click", function() {
            let ultimaPath = document.getElementById("ultima-path").files[0];
            let saveFolder = document.getElementById("save-folder").value;

            if (!ultimaPath || !saveFolder) {
                alert("Please select paths for both Ultima BANK and save folder.");
                return;
            }

            let reader = new FileReader();
            reader.onload = function(event) {
                let data = event.target.result;
                let lines = data.split('\n');
                let filesCount = lines.length;
                let progressStep = 100 / filesCount;
                let currentProgress = 0;

                lines.forEach(function(line, index) {
                    let paramValue = line.split(':').pop().trim();
                    let paramName = ultimaPath.name.replace('BANKING_', '').replace('.txt', '');
                    let fileName = `${paramName}_${index}.json`;

                    let new_data = {
                        'm_Steam64ID': paramName,
                        'm_PlayerName': 'Survivor',
                        'm_OwnedCurrency': parseInt(paramValue),
                        'm_PayCheckBonus': 0,
                        'm_BonusCurrency': 0,
                        'm_ClanID': 'NONE'
                    };

                    let blob = new Blob([JSON.stringify(new_data, null, 4)], { type: 'application/json' });
                    let link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = fileName;
                    link.click();

                    currentProgress += progressStep;
                    document.getElementById("progress").style.width = `${currentProgress}%`;
                });

                document.getElementById("info").textContent = '✅ Conversion completed';
            };

            reader.readAsText(ultimaPath);
        });
    </script>
</body>
</html>
